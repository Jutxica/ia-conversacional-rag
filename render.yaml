services:
  - type: web
    name: dehon-ai-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PYTHONPATH
        value: "."
      - key: ALLOWED_ORIGINS
        value: "https://dehon-ai.onrender.com,https://dehon-ai-frontend.onrender.com,http://localhost:5173,https://dehonia.conventinho.org.br,https://www.dehonia.conventinho.org.br,https://dehon-ai.conventinho.org.br"
      - key: ENABLE_RERANKER
        value: "false"

  - type: web
    name: dehon-ai-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_URL
        value: "https://dehon-ai-backend.onrender.com/api/chat"
