services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

  database:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ia_rag
    ports:
      - "5432:5432"

  vector-db:
    image: alpine
    command: ["sh", "-c", "echo 'Configure Pinecone as an external service'"]